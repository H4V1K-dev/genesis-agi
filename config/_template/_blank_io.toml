# ============================================================
# GENESIS Reference Config — IO (Input Projections)
# ============================================================
# Данный файл описывает паттерн подключения ВНЕШНИХ аксонов (проекций)
# из других регионов мозга или сенсоров в текущую зону.
# НЕ ИСПОЛЬЗУЙТЕ ЕГО ДЛЯ ЗАПУСКА. Это справочник форматов `io.toml`.

# Описание пучка входящих волокон
[[input]]
# STRING: Человекочитаемое имя пучка
name = "From_Retina_Mock"

# STRING: Имя слоя-мишени, в который будут входить и разветвляться проекции.
# Должен совпадать с `name` из `layer` блока в `anatomy.toml`.
target_layer = "L4"

# u32: Количество входящих "внешних аксонов" (волокон).
axon_count = 10000

# u8 [0x00 - 0xFF]: Маска фенотипа входящих волокон.
# Важна для того, чтобы локальные дендриты зоны применяли 
# правильные алгоритмы пластичности к этим входам (например GSOP).
type_mask = 0x01
