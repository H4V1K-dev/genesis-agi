# ============================================================
# GENESIS Reference Config — Blueprints
# ============================================================
# Этот файл содержит ПОЛНЫЙ список всех доступных параметров нейрона.
# НЕ ИСПОЛЬЗУЙТЕ ЕГО ДЛЯ ЗАПУСКА. Используйте как справочник.
# Скопируйте нужные блоки [[neuron_type]] в свой `blueprints.toml`.

# ----------------------------------------------------------------------------
# Доступные типы нейронов (4-битная маска, Spec 02 §5.3)
# ----------------------------------------------------------------------------
# Имя (name) может быть любым, но физическая природа (фенотип) 
# для GPU-физики определяется маской:
#
# Биты [3..0]:
#   Бит 3: Geometry (0=Vertical, 1=Horizontal/Local)
#   Бит 2: Sign (0=Excitatory, 1=Inhibitory)
#   Биты [1..0]: Variant (00, 01, 10, 11) - подтипы с разной физикой
#
# Примеры:
# 0b0000 (0)  = Vertical_Excitatory_V0
# 0b0001 (1)  = Vertical_Excitatory_V1
# 0b0100 (4)  = Vertical_Inhibitory_V0
# 0b1000 (8)  = Horizontal_Excitatory_V0
# 0b1111 (15) = Horizontal_Inhibitory_V3


[[neuron_type]]
# STRING: Уникальное имя типа (используется как ключ в anatomy.toml)
name = "Vertical_Excitatory_Full_Spec"

# ==================== ПАРАМЕТРЫ МЕМБРАНЫ (microVolts) ====================
# i32: Порог срабатывания спайка.
# (Базовое значение, модифицируемое homeostasis_offset)
threshold = 42000

# i32: Потенциал покоя.
# Напряжение при старте симуляции и после спайка (сброс).
rest_potential = 10000

# i32: Скорость пассивной утечки заряда.
# Вычитается из voltage каждую микросекунду (каждый тик).
leak_rate = 1200


# ========================== ТАЙМИНГИ (Ticks) ==========================
# u8 [0-255]: Абсолютная рефрактерность сомы.
# Количество тиков после спайка, когда нейрон игнорирует любые входы.
refractory_period = 15

# u8 [0-255]: Рефрактерность синапса (дендритного порта).
# Количество тиков, в течение которых синапс отдыхает после применения веса.
synapse_refractory_period = 15


# ======================== ФИЗИКА СИГНАЛА (u16) ========================
# u16: Скорость проводимости сигнала по аксону.
# Сколько микрометров проходит сигнал за 1 тик (tick_duration_us).
conduction_velocity = 200

# u16: Длина "Активного Хвоста" в сегментах. (Опционально, по умолчанию 10)
# Определяет ширину окна совпадений (STDP) для обучения (GSOP).
signal_propagation_length = 10


# ======================== РОСТ АКСОНА (Baker) =========================
# u16: Длина одного шага Cone Tracing при генерации геометрии аксона. (По умолчанию 12)
axon_growth_step = 12

# f32: Угол поля зрения конуса поиска (в градусах). (По умолчанию 60.0)
steering_fov_deg = 60.0

# f32: Максимальный радиус сканирования при поиске мишеней (в мкм). (По умолчанию 100.0)
steering_radius_um = 100.0

# f32: Вес "инерции" (стремление расти прямо по прошлому вектору). (По умолчанию 0.6)
steering_weight_inertia = 0.6

# f32: Вес "сенсора" (притяжение к локальным градиентам целевых сомом). (По умолчанию 0.3)
steering_weight_sensor = 0.3

# f32: Вес "случайного блуждания" (шум). (По умолчанию 0.1)
steering_weight_jitter = 0.1


# ======================= ГОМЕОСТАЗ (Адаптация) =======================
# i32: Штраф гомеостаза.
# Добавляется к threshold_offset каждый раз, когда нейрон спайкует.
homeostasis_penalty = 5000

# u16: Спад гомеостаза (восстановление).
# Вычитается из threshold_offset каждый тик, возвращая нейрон к норме.
homeostasis_decay = 10


# ======================== ПЛАСТИЧНОСТЬ (GSOP) ========================
# Управляет обновлением весов синапсов (по умолчанию 74 / 2)
# u16: Значение потенциации (усиление синапса при совпадении пре+пост).
gsop_potentiation = 74

# u16: Значение депрессии (ослабление синапса при отсутствии совпадений).
gsop_depression = 2


# ===================== SLOT DECAY (Fixed-point) =====================
# Фиксированная запятая где 128 = 1.0. Управляет затуханием веса (забыванием).
# u8: Множитель удержания веса для Long Term Memory (слоты 0-79).
slot_decay_ltm = 160

# u8: Множитель распада веса для Working Memory (слоты 80-127).
slot_decay_wm = 96


# ======================= SPROUTING (Ветвление) ======================
# Определяет вероятность того, что растущий дендрит подключится именно к этому типу.
# (f32, сумма должна быть ≈ 1.0)
# Вес геометрической близости при выборе: (По умолчанию 0.5)
sprouting_weight_distance = 0.5

# Вес структурной "важности" целевой сомы: (По умолчанию 0.4)
sprouting_weight_power = 0.4

# Шум / эксплорация для устранения зацикливаний микро-цепей: (По умолчанию 0.1)
sprouting_weight_explore = 0.1


# ======================== NIGHT PHASE (Сон/Обрезка) ========================
# u16: Порог обрезки (pruning) синапсов во время Ночной Фазы.
# Синапсы с весом < prune_threshold будут заменены (структурная пластичность).
# (По умолчанию 15)
prune_threshold = 15
