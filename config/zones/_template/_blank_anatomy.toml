# ============================================================
# GENESIS Reference Config — Anatomy
# ============================================================
# Этот файл содержит ПОЛНЫЙ список всех доступных параметров.
# НЕ ИСПОЛЬЗУЙТЕ ЕГО ДЛЯ ЗАПУСКА. Используйте как справочник.
# Скопируйте нужные блоки в свой `anatomy.toml`.

# Описание слоя. Зоны (кора) обычно имеют L1..L6. Субкортикальные — 1 слой.
[[layer]]
# STRING: Уникальное имя слоя (используется для маршутизации IO)
name = "L1"

# FLOAT [0.0 - 1.0]: Какую долю ВЫСОТЫ зоны (по оси Z) занимает этот слой.
# Сумма всех height_pct в файле должна быть строго равна 1.0.
height_pct = 0.1

# FLOAT [0.0 - 1.0]: Какую долю всего БЮДЖЕТА НЕЙРОНОВ зоны заберет этот слой.
# Сумма всех population_pct в файле должна быть строго равна 1.0.
population_pct = 0.05

# DICTIONARY: Состав нейронов в этом слое (жёсткие квоты).
# Ключи — это имена из `blueprints.toml`.
# Значения — FLOAT [0.0 - 1.0]. Сумма внутри слоя должна быть строго = 1.0.
[layer.composition]
"Vertical_Excitatory" = 0.8
"Horizontal_Inhibitory" = 0.2
